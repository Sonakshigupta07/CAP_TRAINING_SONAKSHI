<!DOCTYPE html>
<html>
<head>
  <title>Laptops</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Laptop Collection</h2>

<div class="product-container">

    <img src="images/laptop1.jpg" alt="Laptop 1">

      <button onclick="changeQty('Laptop 1', -1)">-</button>

    </div>
  </div>

  <div class="product">
    <img src="images/laptop2.jpg" alt="Laptop 2">
    <p>Laptop 2</p>

      <button onclick="changeQty('Laptop 2', -1)">-</button>

    </div>
  </div>

    <img src="images/laptop4.jpg" alt="Laptop 4">

    <div class="counter">
      <button onclick="changeQty('Laptop 4', -1)">-</button>
      <span id="Laptop 4">0</span>

    </div>
  </div>

  <div class="product">
    <img src="images/laptop5.jpg" alt="Laptop 5">
    <p>Laptop 5</p>
    <div class="counter">
      <button onclick="changeQty('Laptop 5', -1)">-</button>
      <span id="Laptop 5">0</span>
      <button onclick="changeQty('Laptop 5', 1)">+</button>
    </div>
  </div>

</div>

<button onclick="addSelectedToCart()">Add to Cart</button>

<script src="script.js"></script>
<script>
  restoreSelections();
</script>
</body>
</html>
