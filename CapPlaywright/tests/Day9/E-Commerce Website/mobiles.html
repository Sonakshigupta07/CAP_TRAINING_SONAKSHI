<!DOCTYPE html>
<html>
<head>
  <title>Mobiles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

</div>

<button onclick="addSelectedToCart()">Add to Cart</button>

<script src="script.js"></script>

<script>
  restoreSelections();
</script>
</body>
</html>
