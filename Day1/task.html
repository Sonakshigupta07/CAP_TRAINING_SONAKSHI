<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Timetable</title>
</head>
<body>
    <h2>Daily time table</h2>
    <table border="1">
    <tr>
        <th>Activity</th>
    </tr>

    <tr>
        <td>10:00 – 11:30</td>
        <td>Class Session</td>
    </tr>

    <tr>
        <td>11:30 – 11:50</td>
        <td>Small Break</td>
    </tr>

    <tr>
        <td>11:50 – 1:00</td>
        <td>Class Session</td>
    </tr>

    <tr>
        <td>1:00 – 2:00</td>
        <td>Lunch Break</td>
    </tr>

    <tr>
        <td>2:00 – 3:15</td>
        <td>Class Session</td>
    </tr>

    <tr>
        <td>3:15 – 3:30</td>
        <td>Small Break</td>
    </tr>

    <tr>
        <td>3:30 – 5:00</td>
        <td>Class Session</td>
    </tr>

    <tr>
        <td>5:00</td>
        <td>Classes Over</td>
    </tr>
</table>

</body>
</html>
