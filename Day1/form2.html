<!DOCTYPE html>
<html>
<head>
    <title>Update Information</title>
</head>
<body>

<div class="box">

    <h2>Update Information</h2>
    <p>Use the form below to edit your information.</p>

    <form>

        <label>First name:</label>
        <input type="text" value="Bruce"><br><br>

        <label>Last name:</label>
        <input type="text" value="Phillips"><br><br>

        <label>Favorite sport:</label>
        <select>
            <option>basketball</option>
            <option>football</option>
            <option>cricket</option>
        </select><br><br>

        <label>Gender:</label>
        <input type="radio" name="g"> male
        <input type="radio" name="g"> female
        <input type="radio" name="g" checked> not sure<br><br>

        <label>State resident:</label>
        <select>
            <option>Kansas</option>
            <option>Texas</option>
            <option>California</option>
        </select><br><br>

        <label></label>
        <input type="checkbox" checked> 21 or older<br><br>

        <label>Car models owned:</label>
        <input type="checkbox" checked> Ford
        <input type="checkbox"> Chrysler
        <input type="checkbox"> Toyota
        <input type="checkbox" checked> Nissan<br><br>

        <input class="btn" type="submit" value="Save Changes">

    </form>

</div>

</body>
</html>
